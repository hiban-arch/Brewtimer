<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brewing Time Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

    /* CSS MODERN CLEAN (Ganti bagian <style> Anda dengan ini) */
<style>
    body { background-color: #edeae6; font-family: 'Helvetica Neue', sans-serif; padding: 20px; display: flex; justify-content: center; }
    
    .container { 
        background-color: #ffffff; 
        padding: 25px; 
        border-radius: 24px; /* Sudut lebih membulat */
        box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* Bayangan lembut */
        width: 100%; max-width: 450px; 
    }

    .input-group input, .pouring-row input, .notes-area { 
        border-radius: 12px; border: 1px solid #e0e0e0; padding: 12px; 
    }

    .btn-control { 
        border-radius: 50px; /* Tombol kapsul */
        padding: 14px; font-size: 16px; 
    }

    .timer-box { 
        background-color: #4a3728; 
        border-radius: 20px; 
        color: #fff; padding: 30px; 
    }

    .btn-add { border-radius: 8px; }
    </style>
    
</head>
<body>

<div class="container">
    <div class="app-title">⏱️ Brewing Timer</div>

    <div class="row">
        <div class="input-group">
            <label>Kopi (Dose gram)</label>
            <input type="number" id="kopi" value="15" oninput="hitungTotalAir()">
        </div>
        <div class="input-group">
            <label>Ratio (1 : x)</label>
            <input type="number" id="ratio" value="15" oninput="hitungTotalAir()">
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label>Total Air (Otomatis)</label>
            <input type="number" id="totalAir" value="225" readonly>
        </div>
        <div class="input-group">
            <label>Suhu Air (°C)</label>
            <input type="number" id="suhu" value="92">
        </div>
    </div>

    <div class="pouring-header">
        <div class="section-title">Interval Pouring (Maks 10)</div>
        <button class="btn-add" onclick="tambahBaris()">+ Tambah</button>
    </div>
    
    <div id="pouringContainer">
        <div class="pouring-row">
            <span class="pour-number">Pour 1</span>
            <span class="status-badge" data-type="Bloom">Bloom</span>
            <input type="number" class="water-input" value="50" placeholder="gram">
            <input type="number" class="time-input" value="45" placeholder="detik">
            <button class="btn-delete" onclick="hapusBaris(this)">✕</button>
        </div>
        <div class="pouring-row">
            <span class="pour-number">Pour 2</span>
            <span class="status-badge" data-type="Pouring">Pouring</span>
            <input type="number" class="water-input" value="100" placeholder="gram">
            <input type="number" class="time-input" value="45" placeholder="detik">
            <button class="btn-delete" onclick="hapusBaris(this)">✕</button>
        </div>
        <div class="pouring-row">
            <span class="pour-number">Pour 3</span>
            <span class="status-badge" data-type="Pouring">Pouring</span>
            <input type="number" class="water-input" value="75" placeholder="gram">
            <input type="number" class="time-input" value="45" placeholder="detik">
            <button class="btn-delete" onclick="hapusBaris(this)">✕</button>
        </div>
    </div>

    <!-- Kotak Timer dengan Posisi Baru -->
    <div class="timer-box">
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="status-display" id="statusDisplay">READY</div>
        
        <!-- Posisi Ditukar -->
        <div class="target-display" id="targetDisplay">Target Air: 0g</div>
        <div class="next-pour-display" id="nextPourDisplay">Pouring selanjutnya: --</div>
        
        <div class="timer-controls">
            <button class="btn-control btn-start" id="btnStart" onclick="toggleTimer()">START</button>
            <button class="btn-control btn-reset" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div class="footer-divider"></div>
    <div class="section-title">Beans & Taste Notes</div>
    <textarea class="notes-area" placeholder="Contoh:&#10;Beans: Ethiopia Sidamo&#10;Taste Notes: Floral, Bergamot, Sweet Honey"></textarea>
</div>

<script>
    let timerInterval = null;
    let totalDetikBerjalan = 0;
    let isRunning = false;
    let daftarLangkah = [];
    let indeksLangkahSekarang = 0;
    let detikDiLangkahSekarang = 0;
    let airKumulatif = 0;

    function hitungTotalAir() {
        const kopi = parseFloat(document.getElementById('kopi').value) || 0;
        const ratio = parseFloat(document.getElementById('ratio').value) || 0;
        document.getElementById('totalAir').value = kopi * ratio;
    }

    function urutkanUlangMekanikBaris() {
        const rows = document.querySelectorAll('.pouring-row');
        rows.forEach((row, index) => {
            row.querySelector('.pour-number').innerText = `Pour ${index + 1}`;
            const badge = row.querySelector('.status-badge');
            if (index === 0) { badge.innerText = 'Bloom'; badge.setAttribute('data-type', 'Bloom'); } 
            else { badge.innerText = 'Pouring'; badge.setAttribute('data-type', 'Pouring'); }
        });
    }

    function tambahBaris() {
        if (isRunning) { alert("Interval tidak bisa ditambah saat timer berjalan!"); return; }
        const container = document.getElementById('pouringContainer');
        if (container.children.length >= 10) return;
        const newRow = document.createElement('div');
        newRow.className = 'pouring-row';
        newRow.innerHTML = `<span class="pour-number">Pour</span><span class="status-badge" data-type="Pouring">Pouring</span><input type="number" class="water-input" value="50" placeholder="gram"><input type="number" class="time-input" value="30" placeholder="detik"><button class="btn-delete" onclick="hapusBaris(this)">✕</button>`;
        container.appendChild(newRow);
        urutkanUlangMekanikBaris();
    }

    function hapusBaris(button) {
        if (isRunning) { alert("Interval tidak bisa dihapus saat timer berjalan!"); return; }
        button.parentElement.remove();
        urutkanUlangMekanikBaris();
    }

    function susunRencanaSeduh() {
        daftarLangkah = [];
        const rows = document.querySelectorAll('.pouring-row');
        airKumulatif = 0;
        rows.forEach((row, idx) => {
            const badge = row.querySelector('.status-badge');
            const tipe = badge.getAttribute('data-type');
            const air = parseFloat(row.querySelector('.water-input').value) || 0;
            const durasi = parseInt(row.querySelector('.time-input').value) || 0;
            airKumulatif += air;
            daftarLangkah.push({ nomor: idx + 1, tipe: tipe, durasi: durasi, targetAir: airKumulatif });
        });
    }

    function formatWaktu(totalDetik) {
        const menit = Math.floor(totalDetik / 60).toString().padStart(2, '0');
        const detik = (totalDetik % 60).toString().padStart(2, '0');
        return `${menit}:${detik}`;
    }

    function toggleTimer() {
        if (!isRunning) {
            if (totalDetikBerjalan === 0) { susunRencanaSeduh(); if (daftarLangkah.length === 0) return; indeksLangkahSekarang = 0; detikDiLangkahSekarang = 0; }
            isRunning = true;
            document.getElementById('btnStart').innerText = 'PAUSE';
            document.getElementById('btnStart').style.backgroundColor = '#f4a261';
            toggleInputLock(true);
            timerInterval = setInterval(jalankanTimer, 1000);
            perbaruiTampilanMekanik();
        } else {
            isRunning = false;
            document.getElementById('btnStart').innerText = 'START';
            document.getElementById('btnStart').style.backgroundColor = '#2a9d8f';
            clearInterval(timerInterval);
        }
    }

    function toggleInputLock(isLocked) {
        const inputs = document.querySelectorAll('.water-input, .time-input');
        inputs.forEach(input => { input.disabled = isLocked; });
    }

    function jalankanTimer() {
        if (indeksLangkahSekarang >= daftarLangkah.length) {
            clearInterval(timerInterval);
            document.getElementById('statusDisplay').innerText = 'SELESAI 🎉';
            document.getElementById('nextPourDisplay').innerText = 'Seduhan selesai!';
            document.getElementById('btnStart').innerText = 'START';
            document.getElementById('btnStart').style.backgroundColor = '#2a9d8f';
            isRunning = false;
            toggleInputLock(false);
            return;
        }
        totalDetikBerjalan++;
        detikDiLangkahSekarang++;
        const langkahAktif = daftarLangkah[indeksLangkahSekarang];
        if (detikDiLangkahSekarang >= langkahAktif.durasi) { indeksLangkahSekarang++; detikDiLangkahSekarang = 0; }
        perbaruiTampilanMekanik();
    }

    function perbaruiTampilanMekanik() {
        document.getElementById('timerDisplay').innerText = formatWaktu(totalDetikBerjalan);
        if (indeksLangkahSekarang < daftarLangkah.length) {
            const langkahAktif = daftarLangkah[indeksLangkahSekarang];
            document.getElementById('statusDisplay').innerText = `${langkahAktif.tipe} (Pour ${langkahAktif.nomor})`;
            document.getElementById('targetDisplay').innerText = `Tuang sampai: ${langkahAktif.targetAir}g`;
            const sisaDetikLangkah = langkahAktif.durasi - detikDiLangkahSekarang;
            if (indeksLangkahSekarang + 1 < daftarLangkah.length) {
                const langkahBerikutnya = daftarLangkah[indeksLangkahSekarang + 1];
                document.getElementById('nextPourDisplay').innerText = `Pour ${langkahBerikutnya.nomor} (${langkahBerikutnya.tipe}) dalam ${sisaDetikLangkah}s`;
            } else {
                document.getElementById('nextPourDisplay').innerText = `Selesai dalam ${sisaDetikLangkah}s`;
            }
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        totalDetikBerjalan = 0;
        indeksLangkahSekarang = 0;
        detikDiLangkahSekarang = 0;
        document.getElementById('timerDisplay').innerText = '00:00';
        document.getElementById('statusDisplay').innerText = 'READY';
        document.getElementById('nextPourDisplay').innerText = 'Pouring selanjutnya: --';
        document.getElementById('targetDisplay').innerText = 'Target Air: 0g';
        document.getElementById('btnStart').innerText = 'START';
        document.getElementById('btnStart').style.backgroundColor = '#2a9d8f';
        toggleInputLock(false);
    }
</script>

</body>
</html>
